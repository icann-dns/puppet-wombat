wombat::cluster::packages:
  - unixodbc
  - odbcinst
  - odbc-postgresql
  - clickhouse-client
  - wombat-clickhouse-server
wombat::cluster::db_driver: /usr/lib/x86_64-linux-gnu/odbc/psqlodbcw.so
wombat::cluster::db_name: wombat
wombat::cluster::db_host: localhost
wombat::cluster::db_username: wombat
wombat::cluster::db_password: wombat
wombat::cluster::db_port: 5432
wombat::cluster::odbc_file: /etc/odbc.ini
wombat::cluster::odbcinst_file: /etc/odbcinst.ini
wombat::cluster::odbc_logdir: /var/log/odbc
wombat::cluster::owner: clickhouse
wombat::compactor::data: /opt/pcap
wombat::compactor::promiscuous_mode: false
wombat::compactor::rotation_period: 300
wombat::compactor::raw_pcap: false
wombat::compactor::ignored_pcap: true
wombat::compactor::capture_data:
  - all
wombat::compactor::ip_addresses:
  - "%{facts.networking.ip}"
wombat::compactor::listen_interfaces: ~
wombat::compactor::compression: xz
wombat::compactor::compression_level: 2
wombat::compactor::pcap_compression: xz
wombat::compactor::pcap_compression_level: 2
wombat::compactor::vlan_id:
  - 0
wombat::compactor::package: dns-stats-compactor
wombat::compactor::conf_dir: /etc/dns-stats-compactor
wombat::compactor::conf_file: "%{lookup('wombat::compactor::conf_dir')}/compactor.conf"
wombat::compactor::tools: /usr/local/bin
wombat::compactor::service: dns-stats-compactor
wombat::compactor::enable: true
wombat::compactor::enable_zabbix: true
wombat::config::conf_dir: /etc/wombat
wombat::config::data_path: /srv/wombat
wombat::config::incoming_dir_pattern: '*/*/incoming'
wombat::config::reload_dir_pattern: '*/*/cbor'
wombat::config::pcap_dir_pattern: '*/*/pcap'
wombat::config::db_name: wombat
wombat::config::db_user: wombat
wombat::config::db_pass: wombat
wombat::config::db_host: ~
wombat::config::clickhouse_servers:
  - localhost
wombat::config::clickhouse_dbdir: /var/lib/clickhouse/
wombat::config::clickhouse_import_server: localhost
wombat::config::clickhouse_node_shard_default: auto
wombat::config::clickhouse_user: wombat
wombat::config::clickhouse_pass: wombat
wombat::config::loggers:
  root:
    level: INFO
    handlers: syslog
  gear:
    level: ERROR
    qualname: gear
    propagate: false
    handlers: syslog
wombat::config::pcap_compress: true
wombat::config::compression_level: 2
wombat::config::anonymisation_passphrase: ~
wombat::config::rssac_url: http://example.com
wombat::config::rssac_outdir: /srv/www
wombat::config::rssac_server: L-Root
wombat::config::rssac_zone: "."
wombat::datastore::packages:
  - clickhouse-client
  - wombat-import
  - python3-psycopg2
  - python3-gear
  - dns-stats-inspector
  - dns-stats-cdnsdumper
  - gearman-tools
  - gearman-job-server
wombat::datastore::archive_dir: /var/pg_wal
wombat::datastore::standby: false
wombat::datastore::queue_user: wombat
wombat::datastore::primary::ipv4_address: 192.0.2.0/24
wombat::datastore::primary::ipv6_address: 2001:db8::0/48
wombat::datastore::primary::roles: {}
wombat::datastore::primary::synchronous_commit: 'on'
wombat::datastore::primary::data_user: pcapture
wombat::datastore::standby::db_host: localhost
wombat::datastore::standby::db_hostaddr:
  - 127.0.0.1
wombat::datastore::standby::db_username: wombat
wombat::datastore::standby::db_password: wombat
wombat::rssacd::packages:
  - wombat-rssac-notify
wombat::rssac_report::packages: 
  - wombat-rssac-reports
wombat::rssac_report::web_root: /srv/www
wombat::rssac_report::output_dir: rssac
wombat::rssac_report::report: all
wombat::rssac_report::server: L-Root
wombat::rssac_report::report_server_name: 'l.root-servers.net'
